<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOU2 Training PRO</title>

<style>
body{margin:0;font-family:Arial;background:#0b1020;color:white}
.hidden{display:none!important}
.card{background:#111827;padding:20px;border-radius:12px;margin:15px}
button{padding:10px;border:none;border-radius:8px;background:#2563eb;color:white;cursor:pointer}
input{padding:10px;border-radius:8px;border:1px solid #334155;background:#020617;color:white}
.option{padding:10px;margin:6px 0;background:#1e293b;border-radius:8px;cursor:pointer}

#introScreen{position:fixed;inset:0;display:flex;justify-content:center;align-items:center;background:radial-gradient(circle,#12275b,#020617);z-index:9999}
.intro-title{font-size:60px;font-weight:900;background:linear-gradient(90deg,#60a5fa,#22c55e,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

#loadingScreen{position:fixed;inset:0;display:flex;justify-content:center;align-items:center;background:#020617;z-index:9998}
.loader{width:60px;height:60px;border:5px solid #334155;border-top:5px solid #22c55e;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

<body>

<div id="introScreen">
 <div class="card" style="text-align:center">
  <h1 class="intro-title">HOU2 REFRESHER</h1>
  <button id="enterBtn">ENTER</button>
 </div>
</div>

<div id="loadingScreen" class="hidden">
 <div class="loader"></div>
</div>

<div id="appRoot" class="hidden">

<div class="card" id="loginCard">
<h2>Login</h2>
<input id="user" placeholder="Enter Login ID">
<button onclick="start()">Start Test</button>
</div>

<div class="card" id="exam" style="display:none">
<h3 id="q"></h3>
<div id="opts"></div>
</div>

<div class="card">
<h2>LIVE DASHBOARD</h2>
<div id="results"></div>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
let db=null;

const firebaseConfig = {
  apiKey: "AIzaSyATaj7lRp6FwV9wzOu3blMH5oufzNdWpfc",
  authDomain: "dea-test-46642.firebaseapp.com",
  databaseURL: "https://dea-test-46642-default-rtdb.firebaseio.com",
  projectId: "dea-test-46642",
  storageBucket: "dea-test-46642.firebasestorage.app",
  messagingSenderId: "133524555154",
  appId: "1:133524555154:web:0a7ecde4b7e596eeb32d4b"
};};

try{
 if(firebaseConfig.apiKey !== "const firebaseConfig = {
  apiKey: "AIzaSyATaj7lRp6FwV9wzOu3blMH5oufzNdWpfc",
  authDomain: "dea-test-46642.firebaseapp.com",
  databaseURL: "https://dea-test-46642-default-rtdb.firebaseio.com",
  projectId: "dea-test-46642",
  storageBucket: "dea-test-46642.firebasestorage.app",
  messagingSenderId: "133524555154",
  appId: "1:133524555154:web:0a7ecde4b7e596eeb32d4b"
};"){
   firebase.initializeApp(firebaseConfig);
   db=firebase.firestore();
 }
}catch(e){console.error(e);}

const allowedAA=[
'BOTUSA','CLOUIVOR','COLOJUL','DANAGAME','ESTEFFVR','GERMRODX',
'GIPSOMAR','GOCCONNI','GONZSMON','HOQSAMIN','HUGHEAHM','IMARYAJO',
'JESUALAN','KARRHEND','LARJOSEL','LEDEZJUA','LEMICHW','LESLSGAR',
'LEWQUANT','LTONYVU','MAGUZMAX','MENBRISA','MERILESV','RAMOSVGE',
'ZAPATKAT','ZCERDAAN','DAVELLDI'
];

let baseQuestions=[
{q:"SDT?",o:["A","B","Scheduled Departure Time"],a:2},
{q:"CPT?",o:["A","Critical Pull Time","C"],a:1}
];

function shuffle(a){return a.sort(()=>Math.random()-0.5)}

let questions=[],i=0,score=0,user="";

function start(){
 user=document.getElementById("user").value.trim().toUpperCase();
 if(!user){alert("Enter Login ID");return;}
 if(!allowedAA.includes(user)){alert("ACCESS DENIED");return;}
 questions=shuffle([...baseQuestions]);
 i=0;score=0;
 document.getElementById("loginCard").style.display="none";
 document.getElementById("exam").style.display="block";
 next();
}

function next(){
 if(i>=questions.length){finish();return;}
 let q=questions[i];
 document.getElementById("q").innerText=q.q;
 document.getElementById("opts").innerHTML=q.o.map((o,idx)=>
 `<div class="option" onclick="ans(${idx})">${o}</div>`
 ).join("");
}

function ans(idx){
 if(idx===questions[i].a)score++;
 i++;next();
}

function finish(){
 let percent=Math.round((score/questions.length)*100);
 if(db){
   db.collection("hou2_results").add({loginId:user,percent,completedAt:new Date().toISOString()});
 }
 alert("Submitted "+percent+"%");
}

if(db){
 db.collection("hou2_results").orderBy("completedAt","desc")
 .onSnapshot(s=>{
   let h="";
   s.forEach(d=>{
     let r=d.data();
     h+=`<div>${r.loginId} - ${r.percent}%</div>`;
   });
   document.getElementById("results").innerHTML=h;
 });
}

document.getElementById("enterBtn").onclick=()=>{
 document.getElementById("introScreen").style.display="none";
 document.getElementById("loadingScreen").classList.remove("hidden");
 setTimeout(()=>{
   document.getElementById("loadingScreen").classList.add("hidden");
   document.getElementById("appRoot").classList.remove("hidden");
 },1200);
};
</script>

</body>
</html>
