<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOU2 PRO v4.0</title>

<style>
body{margin:0;font-family:Arial;background:#0b1020;color:white}
.hidden{display:none}
.card{background:#111827;padding:20px;border-radius:12px;margin:15px}
button{padding:10px;border:none;border-radius:8px;cursor:pointer}
.green{background:#22c55e}
.yellow{background:#f59e0b}
.red{background:#ef4444}
</style>
</head>

<body>

<div class="card" id="login">
<h2>HOU2 REFRESHER</h2>
<input id="name" placeholder="Login ID"><br><br>
<button onclick="start()">Start Test</button>
</div>

<div class="card hidden" id="quiz">
<h3 id="qText"></h3>
<div id="options"></div>
<div>⏱ Time: <span id="timer">15</span>s</div>
</div>

<div class="card hidden" id="result">
<h2 id="scoreText"></h2>
</div>

<div class="card hidden" id="admin">
<h2>ADMIN DASHBOARD</h2>
<div id="leaderboard"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBb3Hp9fDJMzXXWCIQ_LZM1qg01Zq2b6xc",
  authDomain: "test-1-56661.firebaseapp.com",
  projectId: "test-1-56661"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// QUESTIONS
const questions = [
 {q:"What is SDT?",a:["Scheduled Dock Time","Shipment Delivery Target","Scheduled Departure Time"],c:2},
 {q:"What is CPT?",a:["Carrier Processing Time","Critical Pull Time","Container Processing Target"],c:1}
];

let index=0,score=0,time=15,interval;

// START
window.start=function(){
 document.getElementById("login").classList.add("hidden");
 document.getElementById("quiz").classList.remove("hidden");
 loadQ();
};

// LOAD QUESTION
function loadQ(){
 clearInterval(interval);
 time=15;
 document.getElementById("timer").innerText=time;

 interval=setInterval(()=>{
  time--;
  document.getElementById("timer").innerText=time;
  if(time<=0){next(-1);}
 },1000);

 const q=questions[index];
 document.getElementById("qText").innerText=q.q;
 document.getElementById("options").innerHTML=
 q.a.map((opt,i)=>`<button onclick="next(${i})">${opt}</button>`).join("<br><br>");
}

// NEXT
window.next=async function(i){
 clearInterval(interval);

 if(i===questions[index].c) score++;

 index++;
 if(index>=questions.length){
   finish();
   return;
 }
 loadQ();
};

// FINISH
async function finish(){
 document.getElementById("quiz").classList.add("hidden");
 document.getElementById("result").classList.remove("hidden");

 let percent=Math.round(score/questions.length*100);
 document.getElementById("scoreText").innerText="Score: "+percent+"%";

 await addDoc(collection(db,"results"),{
  name:document.getElementById("name").value,
  score:percent,
  time:new Date().toISOString()
 });
}

// ADMIN LIVE VIEW
onSnapshot(collection(db,"results"),(snap)=>{
 let html="";
 snap.forEach(doc=>{
   let d=doc.data();
   let color=d.score>=85?"green":d.score>=70?"yellow":"red";
   html+=`<div class="${color}">${d.name} - ${d.score}%</div>`;
 });
 document.getElementById("leaderboard").innerHTML=html;
 document.getElementById("admin").classList.remove("hidden");
});

// 🔒 ANTI-CHEAT
document.addEventListener("visibilitychange",()=>{
 if(document.hidden){
   alert("Cheating detected - test ended");
   location.reload();
 }
});
</script>

</body>
</html>
